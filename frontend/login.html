<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Iniciar Sesión</title>
</head>
<body>
    <div class="session-container">
        <div class="session-header">
            <h1>Iniciar Sesión</h1>
            <p>Accede a tu cuenta</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    placeholder="tu@email.com" 
                    required
                >
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="••••••••" 
                    required
                >
            </div>

            <div class="remember-forgot">
                <div class="checkbox-wrapper">
                    <input type="checkbox" id="remember" name="remember">
                    <label for="remember" style="margin-bottom: 0;">Recuérdame</label>
                </div>
                <a href="#forgot">¿Olvidaste tu contraseña?</a>
            </div>

            <button type="submit">Iniciar Sesión</button>
        </form>

        <p id="loginMessage" style="margin-top: 15px; text-align:center; color:#333;"></p>

        <div class="signup-link">
            ¿No tienes cuenta? <a href="register.html">Regístrate aquí</a>
        </div>
    </div>

    <script>
        const apiUrl = 'http://localhost:4000/api';

        document.getElementById('loginForm').addEventListener('submit', async (event) => {
            event.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const messageEl = document.getElementById('loginMessage');

            try {
                const response = await fetch(`${apiUrl}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const result = await response.json();
                if (!response.ok) {
                    messageEl.style.color = 'red';
                    messageEl.textContent = result.error || 'Error al iniciar sesión';
                    return;
                }

                messageEl.style.color = 'green';
                messageEl.textContent = 'Inicio de sesión exitoso. Bienvenido ' + result.user.firstname + '!';
            } catch (err) {
                messageEl.style.color = 'red';
                messageEl.textContent = 'No se pudo conectar al servidor. Comprueba backend.';
                console.error(err);
            }
        });
    </script>
</body>
</html>
